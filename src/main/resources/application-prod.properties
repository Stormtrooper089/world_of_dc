server.port=8080
server.servlet.context-path=/

# MongoDB URI - MUST be set via environment variable MONGODB_URI or SPRING_DATA_MONGODB_URI
# Spring Boot automatically maps SPRING_DATA_MONGODB_URI to spring.data.mongodb.uri
# If not set, will use default (which should fail in production - this is intentional)
# For production deployment, ensure MONGODB_URI is set in .env file
spring.data.mongodb.uri=mongodb+srv://admin:admin@cluster0.ay8sec7.mongodb.net/?appName=Cluster0

# Logging configuration
logging.level.root=WARN
logging.level.com.cachar.complaint=INFO
logging.level.org.springframework.data.mongodb=INFO
logging.level.org.mongodb.driver=INFO
logging.file.name=/var/log/cachar-complaints/application.log

# Log MongoDB connection details (masked password)
logging.level.org.springframework.boot.autoconfigure.mongo=DEBUG
