# =============================================================================
# MULTIPART/FILE UPLOAD CONFIGURATION
# =============================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.file-size-threshold=2KB

# =============================================================================
# JACKSON JSON CONFIGURATION
# =============================================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.serialization.indent-output=true
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Kolkata

# =============================================================================
# APPLICATION SPECIFIC CONFIGURATION
# =============================================================================
file.upload-dir=./uploads

# JWT Configuration
jwt.secret=mySecretKey123456789012345678901234567890
jwt.expiration-ms=3600000

# SMS/OTP Configuration
sms.provider=console
sms.api-key=your_sms_api_key
sms.sender-id=CACHAR

# Complaint Configuration
complaint.number.prefix=CCR
complaint.number.length=18

# =============================================================================
# UPYOG PROPERTY TAX INTEGRATION
# Replace these placeholders with the tenant credentials provided by UPYOG/NIUA.
# =============================================================================
property-tax.provider=${PROPERTY_TAX_PROVIDER:UPYOG}
upyog.base-url=${UPYOG_BASE_URL:https://upyog-placeholder.niua.in}
upyog.tenant-id=${UPYOG_TENANT_ID:smc.silchar}
upyog.client-id=${UPYOG_CLIENT_ID:dummy-smc-client-id}
upyog.client-secret=${UPYOG_CLIENT_SECRET:dummy-smc-client-secret}
upyog.api-key=${UPYOG_API_KEY:dummy-upyog-api-key}
upyog.callback-secret=${UPYOG_CALLBACK_SECRET:dummy-callback-secret}
upyog.endpoints.property-search=${UPYOG_PROPERTY_SEARCH_PATH:/property-services/property/_search}
upyog.endpoints.demand-search=${UPYOG_DEMAND_SEARCH_PATH:/billing-service/demand/_search}
upyog.endpoints.payment-initiate=${UPYOG_PAYMENT_INITIATE_PATH:/collection-services/payments/_create}
upyog.endpoints.receipt-search=${UPYOG_RECEIPT_SEARCH_PATH:/collection-services/payments/_search}
upyog.endpoints.service-request=${UPYOG_SERVICE_REQUEST_PATH:/property-services/property/request/_create}
upyog.endpoints.dashboard=${UPYOG_DASHBOARD_PATH:/dashboard-analytics/property-tax/_summary}
upyog.endpoints.defaulters=${UPYOG_DEFAULTERS_PATH:/property-services/property/defaulters/_search}

# =============================================================================
# LOGGING CONFIGURATION
# =============================================================================
logging.level.root=INFO
logging.level.com.cachar.complaint=INFO
logging.level.org.springframework.data.mongodb=INFO
logging.level.org.mongodb.driver=WARN
logging.level.org.apache.tomcat.util.net=ERROR
logging.level.org.dcoffice.cachar.config.JwtAuthenticationFilter=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/cachar-complaints.log

# =============================================================================
# ACTUATOR/MONITORING CONFIGURATION
# =============================================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized

# =============================================================================
# APPLICATION INFORMATION
# =============================================================================
info.app.name=Cachar District Complaint Management System
info.app.description=MongoDB-based complaint management system
info.app.version=1.0.0
